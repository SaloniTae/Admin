name: Manual Nuitka Compilation

# This ensures the workflow ONLY runs when you manually click a button
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Highly stable version for Pyrogram and Nuitka

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py # ⚠️ CHANGE THIS to your actual main entry script (e.g., bot.py)
          mode: onefile
          # Forcing Nuitka to bundle these entirely to prevent ModuleNotFoundError crashes
          include-package: |
            pyrogram
            aiohttp
            PIL
            requests
            pytz
            qrcode_styled

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bot-executable
          path: build/*.bin
          
