name: Compile Python to Linux Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest # This ensures the binary is compiled specifically for Linux

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can change this to your preferred Python version

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile # Compiles everything into a single, highly portable binary file

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: build/*.bin # Nuitka outputs Linux binaries with a .bin extension
